# fly.toml app configuration file generated for olmec on 2026-04-11T23:40:10-07:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'olmec'
primary_region = 'sjc'

[build]

[env]
  OLMEC_MODE = 'cloud'
  OLMEC_VOICE = 'olmec-v1-fx'

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0

[[vm]]
  memory = '512mb'
  cpus = 1
  memory_mb = 1024
